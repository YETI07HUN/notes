<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#0a0a0f;--surface:#111118;--panel:#16161f;--border:#222233;
      --accent:#6c63ff;--accent2:#ff6b9d;--text:#e8e8f0;--muted:#5a5a72;
      --success:#00d9a3;--danger:#ff4d6a;
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
    #auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);animation:fadeIn .4s ease}
    #auth-screen.hidden{display:none}
    .auth-card{width:420px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 40px;position:relative;overflow:hidden}
    .auth-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,99,255,.18) 0%,transparent 70%);pointer-events:none}
    .auth-card::after{content:'';position:absolute;bottom:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,107,157,.12) 0%,transparent 70%);pointer-events:none}
    .auth-logo{font-family:var(--font-display);font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
    .auth-subtitle{color:var(--muted);font-size:13px;margin-bottom:32px}
    .auth-tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--panel);border-radius:10px;padding:4px}
    .auth-tab{flex:1;padding:8px 0;border:none;background:none;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;transition:all .2s}
    .auth-tab.active{background:var(--accent);color:#fff}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
    .form-group input{width:100%;padding:11px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:var(--accent)}
    .form-group input::placeholder{color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:none;border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--accent);color:#fff;width:100%}
    .btn-primary:hover{background:#5a52e0;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--muted);font-size:13px;border:none;cursor:pointer;font-family:var(--font-body)}
    .auth-footer{text-align:center;margin-top:20px}
    .auth-footer button{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:var(--font-body)}
    .auth-footer button:hover{text-decoration:underline}
    .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .alert.show{display:block}
    .alert-error{background:rgba(255,77,106,.1);color:var(--danger);border:1px solid rgba(255,77,106,.2)}
    .alert-success{background:rgba(0,217,163,.1);color:var(--success);border:1px solid rgba(0,217,163,.2)}
    #app{display:flex;height:100vh;animation:fadeIn .4s ease}
    #app.hidden{display:none}
    .sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
    .sidebar-logo{font-family:var(--font-display);font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .user-info{display:flex;align-items:center;gap:10px;margin-top:14px}
    .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
    .user-name{font-size:13px;font-weight:500;color:var(--text)}
    .user-email{font-size:11px;color:var(--muted)}
    .sidebar-section{padding:16px 14px 8px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
    .groups-list{flex:1;overflow-y:auto;padding:0 8px}
    .group-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative}
    .group-item:hover{background:var(--panel)}
    .group-item.active{background:rgba(108,99,255,.15)}
    .group-icon{width:34px;height:34px;border-radius:10px;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .group-item.active .group-icon{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.4)}
    .group-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .group-delete{opacity:0;background:none;border:none;color:var(--danger);cursor:pointer;padding:4px;border-radius:6px;transition:opacity .15s,background .15s;font-size:14px}
    .group-item:hover .group-delete{opacity:1}
    .group-delete:hover{background:rgba(255,77,106,.15)}
    .sidebar-footer{padding:14px;border-top:1px solid var(--border);display:flex;gap:8px}
    .btn-create-group{flex:1;padding:10px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.25);border-radius:10px;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-create-group:hover{background:rgba(108,99,255,.2)}
    .btn-logout{padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font-body);transition:all .2s}
    .btn-logout:hover{color:var(--danger);border-color:rgba(255,77,106,.3)}
    .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:14px}
    .chat-header-icon{width:40px;height:40px;border-radius:12px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.25);display:flex;align-items:center;justify-content:center;font-size:18px}
    .chat-title{font-family:var(--font-display);font-size:16px;font-weight:700}
    .chat-members{font-size:12px;color:var(--muted);margin-top:2px}
    .messages-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:4px}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
    .empty-icon{font-size:48px;opacity:.4}
    .empty-text{font-size:14px}
    .msg-group{margin-bottom:16px}
    .msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
    .msg-author{font-size:13px;font-weight:600;color:var(--accent)}
    .msg-time{font-size:11px;color:var(--muted)}
    .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:10px 14px;max-width:560px;font-size:14px;line-height:1.55;position:relative;word-break:break-word}
    .msg-bubble.own{background:rgba(108,99,255,.15);border-color:rgba(108,99,255,.25);border-radius:14px 4px 14px 14px}
    .msg-own-group{align-items:flex-end}
    .msg-own-group .msg-header{flex-direction:row-reverse}
    .msg-own-group .msg-author{color:var(--accent2)}
    .msg-own-group .msg-bubble{margin-left:auto}
    .msg-delete{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;opacity:0;transition:opacity .15s,color .15s}
    .msg-bubble:hover .msg-delete{opacity:1}
    .msg-delete:hover{color:var(--danger)}
    .msg-image{max-width:280px;border-radius:10px;margin-top:6px;cursor:pointer;display:block}
    .msg-file{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--accent);text-decoration:none;margin-top:6px;transition:background .15s}
    .msg-file:hover{background:rgba(108,99,255,.1)}
    .input-area{padding:16px 24px;background:var(--surface);border-top:1px solid var(--border)}
    .input-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
    .preview-item{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted)}
    .preview-item img{width:28px;height:28px;border-radius:4px;object-fit:cover}
    .preview-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;line-height:1}
    .input-row{display:flex;align-items:flex-end;gap:10px}
    .input-attach-btns{display:flex;gap:6px}
    .btn-attach{width:40px;height:40px;border-radius:10px;background:var(--panel);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-attach:hover{border-color:var(--accent);color:var(--accent)}
    .msg-input{flex:1;padding:11px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s;resize:none;min-height:42px;max-height:120px;line-height:1.5}
    .msg-input:focus{border-color:var(--accent)}
    .msg-input::placeholder{color:var(--muted)}
    .btn-send{width:42px;height:42px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-send:hover{background:#5a52e0;transform:translateY(-1px)}
    .btn-send:disabled{opacity:.4;cursor:default;transform:none}
    .no-group{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
    .no-group-icon{font-size:64px;opacity:.2}
    .no-group-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);opacity:.4}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease}
    .modal-overlay.hidden{display:none}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:380px}
    .modal h3{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:20px}
    .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:2000;cursor:zoom-out;animation:fadeIn .2s ease}
    .lightbox.hidden{display:none}
    .lightbox img{max-width:90vw;max-height:90vh;border-radius:10px}
    .confirm-banner{background:rgba(255,107,157,.1);border-bottom:1px solid rgba(255,107,157,.25);color:var(--accent2);padding:10px 16px;font-size:13px;text-align:center;position:fixed;top:0;left:0;right:0;z-index:500}
    .confirm-banner.hidden{display:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:640px){.sidebar{width:220px;min-width:220px}.auth-card{width:95vw;padding:32px 24px}}
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">NexusChat</div>
    <div class="auth-subtitle">Csatlakozz a közösséghez</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Bejelentkezés</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Regisztráció</button>
    </div>
    <div id="auth-alert" class="alert"></div>
    <div id="login-form">
      <div class="form-group"><label>Email cím</label><input type="email" id="login-email" placeholder="email@cim.hu" onkeydown="if(event.key==='Enter')handleLogin()"/></div>
      <div class="form-group"><label>Jelszó</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()"/></div>
      <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Bejelentkezés</button>
      <div class="auth-footer" style="display:flex;justify-content:space-between;margin-top:14px;">
        <button onclick="switchTab('forgot')">Elfelejtettem a jelszavam</button>
        <button onclick="switchTab('register')">Nincs még fiókom</button>
      </div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Felhasználónév</label><input type="text" id="reg-username" placeholder="pl. kovacs_peter"/></div>
      <div class="form-group"><label>Email cím</label><input type="email" id="reg-email" placeholder="email@cim.hu"/></div>
      <div class="form-group"><label>Jelszó</label><input type="password" id="reg-password" placeholder="Min. 6 karakter" onkeydown="if(event.key==='Enter')handleRegister()"/></div>
      <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">Fiók létrehozása</button>
      <div class="auth-footer"><button onclick="switchTab('login')">Van már fiókom</button></div>
    </div>
    <div id="forgot-form" style="display:none">
      <div class="form-group"><label>Email cím</label><input type="email" id="forgot-email" placeholder="email@cim.hu" onkeydown="if(event.key==='Enter')handleForgot()"/></div>
      <button class="btn btn-primary" id="btn-forgot" onclick="handleForgot()">Jelszó-visszaállító link küldése</button>
      <div class="auth-footer"><button onclick="switchTab('login')">← Vissza</button></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="confirm-banner" class="confirm-banner hidden">
    📧 Erősítsd meg az email címed! Ellenőrizd a beérkező leveleid.
    <button onclick="document.getElementById('confirm-banner').classList.add('hidden')" style="background:none;border:none;color:var(--accent2);cursor:pointer;margin-left:10px;font-size:16px;">✕</button>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">NexusChat</div>
      <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <div><div class="user-name" id="user-display-name">–</div><div class="user-email" id="user-display-email">–</div></div>
      </div>
    </div>
    <div class="sidebar-section">Csoportok</div>
    <div class="groups-list" id="groups-list"><div style="padding:20px 10px;color:var(--muted);font-size:13px;text-align:center;">Betöltés…</div></div>
    <div class="sidebar-footer">
      <button class="btn-create-group" onclick="openCreateGroup()">＋ Új csoport</button>
      <button class="btn-logout" onclick="handleLogout()" title="Kijelentkezés">⎋</button>
    </div>
  </aside>
  <main class="chat-area">
    <div class="no-group" id="no-group-view">
      <div class="no-group-icon">💬</div>
      <div class="no-group-title">Válassz egy csoportot</div>
      <div style="color:var(--muted);font-size:13px;">vagy hozz létre újat a bal oldalsávban</div>
    </div>
    <div id="group-view" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <div class="chat-header-icon" id="chat-header-icon">💬</div>
        <div><div class="chat-title" id="chat-title">–</div><div class="chat-members">Csoport</div></div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <div class="input-preview" id="input-preview"></div>
        <div class="input-row">
          <div class="input-attach-btns">
            <button class="btn-attach" title="Kép" onclick="document.getElementById('file-image').click()">🖼️</button>
            <button class="btn-attach" title="Fájl" onclick="document.getElementById('file-doc').click()">📎</button>
          </div>
          <textarea class="msg-input" id="msg-input" placeholder="Írj üzenetet…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
            oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
        </div>
        <input type="file" id="file-image" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this,'image')"/>
        <input type="file" id="file-doc" multiple style="display:none" onchange="handleFileSelect(this,'file')"/>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="modal-create-group">
  <div class="modal">
    <h3>Új csoport létrehozása</h3>
    <div class="form-group"><label>Csoport neve</label><input type="text" id="new-group-name" placeholder="pl. Projekt Alpha"/></div>
    <div class="form-group"><label>Emoji ikon (opcionális)</label><input type="text" id="new-group-emoji" placeholder="💬" maxlength="4"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-create-group')">Mégse</button>
      <button class="btn btn-primary" style="width:auto" onclick="createGroup()">Létrehozás</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-reset-password">
  <div class="modal">
    <h3>🔐 Új jelszó beállítása</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Add meg az új jelszavadat.</p>
    <div id="reset-pw-alert" class="alert"></div>
    <div class="form-group"><label>Új jelszó</label><input type="password" id="reset-pw-1" placeholder="Min. 6 karakter"/></div>
    <div class="form-group"><label>Ismét</label><input type="password" id="reset-pw-2" placeholder="••••••••"/></div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="width:auto" id="btn-reset-pw" onclick="handleResetPassword()">Jelszó mentése</button>
    </div>
  </div>
</div>

<div class="lightbox hidden" id="lightbox" onclick="this.classList.add('hidden')">
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
const SUPABASE_URL      = 'https://znaskyxslmuhrdmpkqxb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuYXNreXhzbG11aHJkbXBrcXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzI3MDAsImV4cCI6MjA4ODcwODcwMH0.jzJkOPvyefSZAzeRZ-FZip8wRNdz1bUBRplSkjyCHmw';
const STORAGE_BUCKET    = 'chat-files';

const { createClient } = supabase;
// detectSessionInUrl:true => Supabase olvassa ki a hash tokent automatikusan
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
});

let currentUser=null, currentProfile=null, currentGroup=null;
let groups=[], realtimeSub=null, pendingFiles=[];

// Oldal betöltésekor azonnal lekérjük a tárolt session-t → nincs login-oldal villanás frissítéskor
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    await loadProfile();
    showApp();
    if (window.location.hash.includes('access_token')) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  } else {
    showAuth();
  }
})();

// onAuthStateChange – csak a getSession UTÁNI változásokra reagál (login/logout/recovery)
sb.auth.onAuthStateChange(async (event, session) => {
  console.log('[Auth]', event, session?.user?.email ?? '-');

  if (event === 'INITIAL_SESSION') return; // getSession már kezelte

  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    setTimeout(() => document.getElementById('modal-reset-password').classList.remove('hidden'), 200);
    return;
  }

  if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') {
    if (session?.user) {
      currentUser = session.user;
      if (!currentProfile) await loadProfile();
      if (document.getElementById('app').classList.contains('hidden')) showApp();
      if (window.location.hash.includes('access_token')) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }
    return;
  }

  if (event === 'SIGNED_OUT') {
    currentUser = null; currentProfile = null; currentGroup = null;
    if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
    showAuth();
  }
});

// Hiba hash kezelés (lejárt link) – csak error esetén, access_token nélkül
window.addEventListener('load', () => {
  const hash = window.location.hash.substring(1);
  if (!hash || hash.includes('access_token')) return;
  const params = {};
  hash.split('&').forEach(p => { const i=p.indexOf('='); if(i>-1) params[decodeURIComponent(p.slice(0,i))]=decodeURIComponent(p.slice(i+1)); });
  if (params.error) {
    history.replaceState(null,'', window.location.pathname + window.location.search);
    const m = { otp_expired:'A megerősítő link lejárt. Kérj új jelszó-visszaállító emailt, vagy regisztrálj újra.', access_denied:'A link érvénytelen vagy már felhasználták.' };
    setTimeout(() => showAlert(m[params.error_code] || params.error_description || 'Ismeretlen hiba.', 'error'), 400);
  }
});

function switchTab(tab) {
  ['login','register','forgot'].forEach(t => {
    document.getElementById(t+'-form').style.display = t===tab?'block':'none';
    const el=document.getElementById('tab-'+t); if(el) el.classList.toggle('active',t===tab);
  });
  clearAlert();
}
function showAlert(msg, type='error') { const el=document.getElementById('auth-alert'); if(!el)return; el.className=`alert show alert-${type}`; el.textContent=msg; }
function clearAlert() { const el=document.getElementById('auth-alert'); if(el){el.className='alert';el.textContent='';} }
function btnLoad(id, loading, label='') { const b=document.getElementById(id); if(!b)return; b.disabled=loading; b.innerHTML=loading?'<span class="spinner"></span>':label; }

async function handleRegister() {
  const username=document.getElementById('reg-username').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const password=document.getElementById('reg-password').value;
  if(!username||!email||!password) return showAlert('Minden mező kitöltése kötelező!');
  if(password.length<6) return showAlert('A jelszó legalább 6 karakter legyen!');
  if(!/^[a-z0-9_.\-]+$/i.test(username)) return showAlert('Felhasználónév: betű, szám, _ . - engedélyezett.');
  btnLoad('btn-register',true);
  const {data,error} = await sb.auth.signUp({email,password,options:{data:{username}}});
  btnLoad('btn-register',false,'Fiók létrehozása');
  if(error) { if(error.message.includes('already registered')) return showAlert('Ez az email cím már foglalt!'); return showAlert(error.message); }
  if(!data.session) showAlert('Sikeres regisztráció! Erősítsd meg az email címed.','success');
}

async function handleLogin() {
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if(!email||!password) return showAlert('Töltsd ki az összes mezőt!');
  btnLoad('btn-login',true);
  const {error} = await sb.auth.signInWithPassword({email,password});
  btnLoad('btn-login',false,'Bejelentkezés');
  if(error) {
    if(error.message.includes('Email not confirmed')) return showAlert('Erősítsd meg az email címed a belépés előtt!');
    return showAlert('Hibás email cím vagy jelszó!');
  }
}

async function handleForgot() {
  const email=document.getElementById('forgot-email').value.trim();
  if(!email) return showAlert('Add meg az email címed!');
  btnLoad('btn-forgot',true);
  const {error} = await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+window.location.pathname});
  btnLoad('btn-forgot',false,'Jelszó-visszaállító link küldése');
  if(error) return showAlert(error.message);
  showAlert('Kiküldtük a visszaállító linket!','success');
}

async function handleLogout() {
  if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
  await sb.auth.signOut();
}

async function handleResetPassword() {
  const p1=document.getElementById('reset-pw-1').value, p2=document.getElementById('reset-pw-2').value;
  const al=document.getElementById('reset-pw-alert');
  const ok=m=>{al.className='alert show alert-success';al.textContent=m;};
  const er=m=>{al.className='alert show alert-error';al.textContent=m;};
  if(p1.length<6) return er('A jelszó legalább 6 karakter legyen!');
  if(p1!==p2) return er('A két jelszó nem egyezik!');
  btnLoad('btn-reset-pw',true);
  const {error} = await sb.auth.updateUser({password:p1});
  btnLoad('btn-reset-pw',false,'Jelszó mentése');
  if(error) return er(error.message);
  ok('Jelszó sikeresen megváltoztatva!');
  setTimeout(()=>closeModal('modal-reset-password'),1500);
}

async function loadProfile() {
  try {
    const {data} = await sb.from('profiles').select('*').eq('id',currentUser.id).maybeSingle();
    if(data){currentProfile=data;return;}
    const username=currentUser.user_metadata?.username||currentUser.email.split('@')[0];
    const {data:np,error:ie} = await sb.from('profiles').insert({id:currentUser.id,username,email:currentUser.email}).select().single();
    if(!ie){currentProfile=np;return;}
    const {data:retry} = await sb.from('profiles').select('*').eq('id',currentUser.id).maybeSingle();
    currentProfile = retry||{username:currentUser.email.split('@')[0],email:currentUser.email};
  } catch(e) {
    console.error('[loadProfile]',e);
    currentProfile={username:currentUser.email.split('@')[0],email:currentUser.email};
  }
}

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const name=currentProfile?.username||currentUser.email.split('@')[0];
  document.getElementById('user-display-name').textContent=name;
  document.getElementById('user-display-email').textContent=currentUser.email;
  document.getElementById('user-avatar').textContent=name.charAt(0).toUpperCase();
  const banner=document.getElementById('confirm-banner'), sidebar=document.getElementById('sidebar');
  if(!currentUser.email_confirmed_at){banner.classList.remove('hidden');sidebar.style.paddingTop='44px';}
  else{banner.classList.add('hidden');sidebar.style.paddingTop='0';}
  loadGroups();
}

async function loadGroups() {
  const {data,error}=await sb.from('groups').select('*').order('created_at');
  if(error){console.error('[loadGroups]',error);return;}
  groups=data||[]; renderGroups();
}

function renderGroups() {
  const list=document.getElementById('groups-list');
  if(!groups.length){list.innerHTML='<div style="padding:20px 10px;color:var(--muted);font-size:13px;text-align:center;">Még nincsenek csoportok</div>';return;}
  list.innerHTML=groups.map(g=>`
    <div class="group-item ${currentGroup?.id===g.id?'active':''}" onclick="selectGroup('${g.id}')">
      <div class="group-icon">${g.emoji||'💬'}</div>
      <div class="group-name">${escHtml(g.name)}</div>
      ${g.created_by===currentUser?.id?`<button class="group-delete" onclick="event.stopPropagation();deleteGroup('${g.id}')">🗑</button>`:''}
    </div>`).join('');
}

function openCreateGroup() {
  document.getElementById('new-group-name').value='';
  document.getElementById('new-group-emoji').value='';
  document.getElementById('modal-create-group').classList.remove('hidden');
  setTimeout(()=>document.getElementById('new-group-name').focus(),50);
}

async function createGroup() {
  const name=document.getElementById('new-group-name').value.trim();
  const emoji=document.getElementById('new-group-emoji').value.trim()||'💬';
  if(!name) return;
  const {data,error}=await sb.from('groups').insert({name,emoji,created_by:currentUser.id}).select().single();
  if(error){console.error('[createGroup]',error);return;}
  closeModal('modal-create-group'); groups.push(data); renderGroups(); selectGroup(data.id);
}

async function deleteGroup(id) {
  if(!confirm('Biztosan törölni szeretnéd?')) return;
  await sb.from('messages').delete().eq('group_id',id);
  await sb.from('groups').delete().eq('id',id);
  groups=groups.filter(g=>g.id!==id);
  if(currentGroup?.id===id){
    currentGroup=null;
    if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
    document.getElementById('no-group-view').style.display='flex';
    document.getElementById('group-view').style.display='none';
  }
  renderGroups();
}

async function selectGroup(id) {
  // Ha ugyanazt kattintják újra is, újratöltjük az üzeneteket
  currentGroup = groups.find(g => g.id === id);
  if (!currentGroup) return;

  document.getElementById('no-group-view').style.display = 'none';
  document.getElementById('group-view').style.display   = 'flex';
  document.getElementById('chat-title').textContent     = currentGroup.name;
  document.getElementById('chat-header-icon').textContent = currentGroup.emoji || '💬';

  renderGroups();

  // Mindig frissen töltjük az üzeneteket (visszakattintáskor is)
  await loadMessages();
  subscribeMessages();
}

async function loadMessages() {
  const area=document.getElementById('messages-area');
  area.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Betöltés…</div>';
  const {data,error}=await sb.from('messages').select('*, profiles(username)').eq('group_id',currentGroup.id).order('created_at');
  if(error){console.error('[loadMessages]',error);return;}
  renderMessages(data||[]);
}

function renderMessages(msgs) {
  const area=document.getElementById('messages-area');
  if(!msgs.length){area.innerHTML='<div class="empty-state"><div class="empty-icon">🗨️</div><div class="empty-text">Még nincs üzenet – kezdj el írni!</div></div>';return;}
  area.innerHTML=msgs.map(buildMessageHtml).join('');
  area.scrollTop=area.scrollHeight;
}

function buildMessageHtml(m) {
  const isOwn=m.user_id===currentUser?.id;
  const author=m.profiles?.username||'Ismeretlen';
  const time=new Date(m.created_at).toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'});
  let content='';
  if(m.content) content+=`<div>${escHtml(m.content)}</div>`;
  if(m.image_url) content+=`<img class="msg-image" src="${escHtml(m.image_url)}" alt="kép" loading="lazy" onclick="openLightbox(this.src)"/>`;
  if(m.file_url&&m.file_name) content+=`<a class="msg-file" href="${escHtml(m.file_url)}" target="_blank" rel="noopener">📄 ${escHtml(m.file_name)}</a>`;
  return `<div class="msg-group ${isOwn?'msg-own-group':''}" data-msg-id="${m.id}">
    <div class="msg-header"><span class="msg-author">${escHtml(author)}</span><span class="msg-time">${time}</span></div>
    <div class="msg-bubble ${isOwn?'own':''}">${content}${isOwn?`<button class="msg-delete" onclick="deleteMessage('${m.id}')">✕</button>`:''}</div>
  </div>`;
}

function subscribeMessages() {
  if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
  const gid=currentGroup.id;
  realtimeSub=sb.channel('room-'+gid)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`group_id=eq.${gid}`}, async payload => {
      if (currentGroup?.id !== gid) return;
      // Deduplikáció: ha már van ilyen ID a DOM-ban (saját küldés), nem adjuk hozzá
      if (document.querySelector(`[data-msg-id="${payload.new.id}"]`)) return;
      const {data:profile} = await sb.from('profiles').select('username').eq('id',payload.new.user_id).maybeSingle();
      const msg = {...payload.new, profiles: profile};
      const area = document.getElementById('messages-area');
      const empty = area.querySelector('.empty-state'); if (empty) empty.remove();
      area.insertAdjacentHTML('beforeend', buildMessageHtml(msg));
      area.scrollTop = area.scrollHeight;
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages',filter:`group_id=eq.${gid}`}, payload => {
      const el=document.querySelector(`[data-msg-id="${payload.old.id}"]`); if(el) el.remove();
    })
    .subscribe((status,err)=>console.log('[Realtime]',status,err||''));
}

async function deleteMessage(id) {
  try {
    const {data:msg}=await sb.from('messages').select('image_url,file_url').eq('id',id).maybeSingle();
    if(msg?.image_url){const p=msg.image_url.split('/'+STORAGE_BUCKET+'/')[1];if(p)await sb.storage.from(STORAGE_BUCKET).remove([decodeURIComponent(p)]);}
    if(msg?.file_url){const p=msg.file_url.split('/'+STORAGE_BUCKET+'/')[1];if(p)await sb.storage.from(STORAGE_BUCKET).remove([decodeURIComponent(p)]);}
    await sb.from('messages').delete().eq('id',id);
  } catch(e){console.error('[deleteMessage]',e);}
}

async function sendMessage() {
  if(!currentGroup||!currentUser) return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text&&!pendingFiles.length) return;
  const btn=document.getElementById('btn-send');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    let image_url=null, file_url=null, file_name=null;
    for(const pf of pendingFiles){
      const safeName=pf.file.name.replace(/[^a-zA-Z0-9._\-]/g,'_');
      const path=`${currentUser.id}/${Date.now()}_${safeName}`;
      const {error:upErr}=await sb.storage.from(STORAGE_BUCKET).upload(path,pf.file);
      if(upErr){console.error('[upload]',upErr);continue;}
      const {data:urlData}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      if(pf.type==='image'){image_url=urlData.publicUrl;}else{file_url=urlData.publicUrl;file_name=pf.file.name;}
    }
    const {error}=await sb.from('messages').insert({group_id:currentGroup.id,user_id:currentUser.id,content:text||null,image_url,file_url,file_name});
    if(error){console.error('[insertMessage]',error);}
    else{input.value='';input.style.height='auto';clearPendingFiles();}
  } catch(e){console.error('[sendMessage]',e);}
  btn.disabled=false; btn.innerHTML='➤';
}

function handleFileSelect(input,type) {
  for(const file of input.files) pendingFiles.push({file,type,previewUrl:type==='image'?URL.createObjectURL(file):null});
  input.value=''; renderPendingFiles();
}
function renderPendingFiles() {
  document.getElementById('input-preview').innerHTML=pendingFiles.map((pf,i)=>`
    <div class="preview-item">${pf.previewUrl?`<img src="${pf.previewUrl}"/>`:'📄'}<span>${escHtml(pf.file.name)}</span><button class="preview-remove" onclick="removePending(${i})">✕</button></div>`).join('');
}
function removePending(i) { if(pendingFiles[i]?.previewUrl)URL.revokeObjectURL(pendingFiles[i].previewUrl); pendingFiles.splice(i,1); renderPendingFiles(); }
function clearPendingFiles() { pendingFiles.forEach(p=>{if(p.previewUrl)URL.revokeObjectURL(p.previewUrl);}); pendingFiles=[]; renderPendingFiles(); }

function openLightbox(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.add('hidden');}));
document.getElementById('new-group-name').addEventListener('keydown',e=>{if(e.key==='Enter')createGroup();});
</script>
</body>
</html>
