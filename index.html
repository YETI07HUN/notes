<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #16161a;
            --surface2: #1e1e24;
            --border: #2a2a35;
            --accent: #7c6af7;
            --accent2: #f765a3;
            --accent3: #43e8b0;
            --text: #e8e8f0;
            --text-muted: #6b6b80;
            --danger: #f74d4d;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ─── AUTH ─── */
        #auth-screen {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        #auth-screen::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
            top: -150px; left: -150px;
            pointer-events: none;
        }

        #auth-screen::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(247,101,163,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-logo span { color: var(--accent2); }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .auth-card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        .field-group {
            margin-bottom: 14px;
        }

        .field-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-group input {
            width: 100%;
            padding: 11px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .field-group input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { opacity: 0.88; }

        .btn-primary {
            background: var(--accent);
            color: white;
            margin-bottom: 10px;
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .btn-ghost {
            background: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 400;
            width: auto;
            padding: 8px 0;
            text-decoration: underline;
        }

        .msg-info {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 12px;
            min-height: 20px;
            color: var(--accent3);
        }

        .msg-info.error { color: var(--danger); }

        /* ─── MAIN LAYOUT ─── */
        #app-screen {
            display: none;
            width: 100%;
            height: 100vh;
        }

        #app-screen.visible { display: flex; }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .sidebar-logo span { color: var(--accent2); }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .sidebar-username {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rooms-section {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .rooms-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 8px;
            margin-bottom: 6px;
        }

        .room-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: background 0.15s, color 0.15s;
        }

        .room-item:hover { background: var(--surface2); color: var(--text); }

        .room-item.active {
            background: rgba(124,106,247,0.15);
            color: var(--accent);
            font-weight: 500;
        }

        .room-hash { font-family: 'Space Mono', monospace; font-size: 0.9rem; }

        .add-room-btn {
            margin: 4px 8px;
            padding: 7px 10px;
            background: none;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, color 0.2s;
        }

        .add-room-btn:hover { border-color: var(--accent); color: var(--accent); }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .signout-btn {
            width: 100%;
            padding: 8px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, color 0.2s;
        }

        .signout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ─── CHAT AREA ─── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
        }

        .chat-room-name {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .chat-room-name span { color: var(--accent); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-wrapper {
            display: flex;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 8px;
            transition: background 0.15s;
            position: relative;
        }

        .msg-wrapper:hover { background: var(--surface2); }

        .msg-wrapper:hover .msg-delete { opacity: 1; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-body { flex: 1; min-width: 0; }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 3px;
        }

        .msg-author {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--accent);
        }

        .msg-time {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .msg-content {
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-image {
            max-width: 300px;
            max-height: 240px;
            border-radius: 8px;
            margin-top: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .msg-image:hover { opacity: 0.9; }

        .msg-file {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .msg-file:hover { border-color: var(--accent); }

        .msg-delete {
            position: absolute;
            right: 8px; top: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--danger);
            font-size: 0.75rem;
            padding: 3px 7px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        /* ─── INPUT AREA ─── */
        .input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within { border-color: var(--accent); }

        .file-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .file-btn:hover { color: var(--accent); background: rgba(124,106,247,0.1); }

        #chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
        }

        #chat-input::placeholder { color: var(--text-muted); }

        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            width: 32px; height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        .send-btn:hover { opacity: 0.85; }
        .send-btn:active { transform: scale(0.93); }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            margin-bottom: 8px;
            background: rgba(124,106,247,0.1);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--accent);
        }

        .file-preview-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            margin-left: auto;
            font-size: 1rem;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 10px;
        }

        .empty-state .icon { font-size: 2.5rem; }

        .empty-state p { font-size: 0.9rem; }

        /* ─── MODAL (new room) ─── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            width: 320px;
        }

        .modal h3 { margin-bottom: 16px; font-size: 1rem; }

        .modal input {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            outline: none;
            margin-bottom: 14px;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-btns { display: flex; gap: 8px; }
        .modal-btns button { flex: 1; }

        /* ─── IMAGE LIGHTBOX ─── */
        #lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        #lightbox.open { display: flex; }
        #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
        #lightbox-close {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;
        }

        .hidden { display: none !important; }

        /* ─── SCROLLBAR GLOBAL ─── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ─── UPLOAD PROGRESS ─── */
        .upload-indicator {
            font-size: 0.8rem;
            color: var(--accent);
            padding: 4px 0;
        }
    </style>
</head>
<body>

<!-- ═══════════════ AUTH ═══════════════ -->
<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">Nex<span>Chat</span></div>
        <div class="auth-subtitle">Valós idejű csevegés szobákkal</div>

        <h2 id="auth-title">Bejelentkezés</h2>

        <!-- Regisztrációs mezők -->
        <div id="reg-fields" class="hidden">
            <div class="field-group">
                <label>Felhasználónév</label>
                <input type="text" id="username" placeholder="pl. kovacs_janos">
            </div>
        </div>

        <!-- Közös mezők -->
        <div class="field-group">
            <label id="email-label">E-mail cím</label>
            <input type="text" id="email" placeholder="pelda@email.hu">
        </div>
        <div class="field-group">
            <label>Jelszó</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="main-btn" onclick="handleAuth()">Bejelentkezés</button>
        <button class="btn btn-secondary" id="switch-btn" onclick="toggleMode()">Még nincs fiókom → Regisztráció</button>
        <button class="btn btn-ghost" onclick="forgotPassword()">Elfelejtettem a jelszavam</button>

        <p class="msg-info" id="msg-info"></p>
    </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app-screen">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">Nex<span>Chat</span></div>
            <div class="sidebar-user">
                <div class="avatar" id="sidebar-avatar">?</div>
                <div class="sidebar-username" id="sidebar-username">...</div>
            </div>
        </div>

        <div class="rooms-section">
            <div class="rooms-label">Szobák</div>
            <div id="rooms-list"></div>
            <button class="add-room-btn" onclick="openNewRoomModal()">+ Új szoba</button>
        </div>

        <div class="sidebar-footer">
            <button class="signout-btn" onclick="signOut()">Kijelentkezés</button>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-area">
        <!-- No room selected -->
        <div class="empty-state" id="no-room-state">
            <div class="icon">💬</div>
            <p>Válassz egy szobát a bal oldali listából</p>
        </div>

        <!-- Room chat -->
        <div id="room-chat" class="hidden" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
            <div class="chat-header">
                <div class="chat-room-name"><span>#</span> <span id="room-name-display">szoba</span></div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="input-area">
                <div id="file-preview-bar" class="hidden file-preview">
                    <span>📎</span>
                    <span id="file-preview-name"></span>
                    <button class="file-preview-remove" onclick="clearFile()">✕</button>
                </div>
                <div id="upload-progress" class="hidden upload-indicator">Feltöltés...</div>
                <div class="input-row">
                    <button class="file-btn" onclick="document.getElementById('file-input').click()" title="Fájl / kép küldése">📎</button>
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip" onchange="handleFileSelect(event)">
                    <input type="text" id="chat-input" placeholder="Üzenet írása... (Enter)">
                    <button class="send-btn" onclick="sendMessage()" title="Küldés">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ NEW ROOM MODAL ═══════════════ -->
<div class="modal-overlay" id="room-modal">
    <div class="modal">
        <h3>Új szoba létrehozása</h3>
        <input type="text" id="new-room-name" placeholder="szoba-neve" maxlength="30">
        <div class="modal-btns">
            <button class="btn btn-secondary" onclick="closeNewRoomModal()">Mégse</button>
            <button class="btn btn-primary" onclick="createRoom()">Létrehozás</button>
        </div>
    </div>
</div>

<!-- ═══════════════ LIGHTBOX ═══════════════ -->
<div id="lightbox" onclick="closeLightbox()">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
</div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
// ════════════════════════════════════════
//  KONFIGURÁCIÓ — cseréld ki a saját adataiddal
// ════════════════════════════════════════
const SUPABASE_URL = 'https://brlfchetlexxmcywxcsd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJybGZjaGV0bGV4eG1jeXd4Y3NkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzAxMzYsImV4cCI6MjA4ODEwNjEzNn0.27MdTH-w5i_17yjqWlTkC9UIQf3X2YDB6HwFZlU2nas';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ════════════════════════════════════════
//  ÁLLAPOT
// ════════════════════════════════════════
let isLoginMode = true;
let currentUser  = null;
let currentRoom  = null;
let realtimeSub  = null;
let pendingFile  = null;

// ════════════════════════════════════════
//  AUTH — MÓD VÁLTÁS
// ════════════════════════════════════════
function toggleMode() {
    isLoginMode = !isLoginMode;

    // Cím
    document.getElementById('auth-title').innerText =
        isLoginMode ? 'Bejelentkezés' : 'Regisztráció';

    // Fő gomb
    document.getElementById('main-btn').innerText =
        isLoginMode ? 'Bejelentkezés' : 'Fiók létrehozása';

    // Váltó gomb
    document.getElementById('switch-btn').innerText =
        isLoginMode ? 'Még nincs fiókom → Regisztráció' : 'Már van fiókom → Bejelentkezés';

    // E-mail mező felirata
    document.getElementById('email-label').innerText =
        isLoginMode ? 'E-mail cím' : 'E-mail cím';

    // Felhasználónév mező (csak regisztrációnál)
    document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);

    setMsg('', false);
}

// ════════════════════════════════════════
//  AUTH — BEJELENTKEZÉS / REGISZTRÁCIÓ
// ════════════════════════════════════════
async function handleAuth() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        return setMsg('Töltsd ki az összes mezőt!', true);
    }

    if (isLoginMode) {
        // ── BEJELENTKEZÉS ──
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return setMsg('Hiba: ' + error.message, true);
        await initApp();

    } else {
        // ── REGISZTRÁCIÓ ──
        const username = document.getElementById('username').value.trim();
        if (!username) return setMsg('Add meg a felhasználóneved!', true);

        const { data, error } = await db.auth.signUp({ email, password });
        if (error) return setMsg('Hiba: ' + error.message, true);

        // Profil mentése
        await db.from('profiles').insert([{
            id: data.user.id,
            username: username
        }]);

        setMsg('Siker! Erősítsd meg az e-mail címedet, majd jelentkezz be.', false);
    }
}

// ════════════════════════════════════════
//  AUTH — ELFELEJTETT JELSZÓ
// ════════════════════════════════════════
async function forgotPassword() {
    const email = prompt('Add meg az e-mail címedet:');
    if (email) {
        await db.auth.resetPasswordForEmail(email);
        alert('Jelszó-visszaállító e-mail elküldve!');
    }
}

function setMsg(text, isError) {
    const el = document.getElementById('msg-info');
    el.innerText = text;
    el.className = 'msg-info' + (isError ? ' error' : '');
}

// ════════════════════════════════════════
//  APP INICIALIZÁLÁS
// ════════════════════════════════════════
async function initApp() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) return;

    currentUser = session.user;

    // Profil betöltés
    const { data: prof } = await db.from('profiles')
        .select('username')
        .eq('id', currentUser.id)
        .single();

    currentUser.username = prof ? prof.username : currentUser.email.split('@')[0];

    // UI frissítés
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.add('visible');
    document.getElementById('sidebar-username').innerText = currentUser.username;
    document.getElementById('sidebar-avatar').innerText =
        currentUser.username.charAt(0).toUpperCase();

    // Szobák betöltése
    await loadRooms();
}

// ════════════════════════════════════════
//  SZOBÁK
// ════════════════════════════════════════
async function loadRooms() {
    const { data: rooms } = await db.from('rooms')
        .select('*')
        .order('created_at', { ascending: true });

    const list = document.getElementById('rooms-list');
    list.innerHTML = '';

    if (!rooms || rooms.length === 0) {
        list.innerHTML = '<div style="padding:8px 10px;font-size:0.8rem;color:var(--text-muted)">Még nincs szoba</div>';
        return;
    }

    rooms.forEach(room => {
        const el = document.createElement('div');
        el.className = 'room-item' + (currentRoom?.id === room.id ? ' active' : '');
        el.innerHTML = `<span class="room-hash">#</span> ${escapeHtml(room.name)}`;
        el.onclick = () => openRoom(room);
        list.appendChild(el);
    });
}

function openRoom(room) {
    currentRoom = room;

    // Sidebar aktív jelölés
    document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Chat panel
    document.getElementById('no-room-state').style.display = 'none';
    const roomChat = document.getElementById('room-chat');
    roomChat.style.display = 'flex';
    roomChat.classList.remove('hidden');
    document.getElementById('room-name-display').innerText = room.name;

    // Üzenetek
    loadMessages();
    subscribeMessages();
}

function openNewRoomModal() {
    document.getElementById('new-room-name').value = '';
    document.getElementById('room-modal').classList.add('open');
    setTimeout(() => document.getElementById('new-room-name').focus(), 100);
}

function closeNewRoomModal() {
    document.getElementById('room-modal').classList.remove('open');
}

async function createRoom() {
    const name = document.getElementById('new-room-name').value.trim()
        .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-_áéíóöőúüű]/g, '');

    if (!name) return;

    // Ellenőrzés: létezik-e már
    const { data: existing } = await db.from('rooms').select('id').eq('name', name).single();
    if (existing) {
        alert('Ez a szoba már létezik!');
        return;
    }

    const { error } = await db.from('rooms').insert([{
        name: name,
        created_by: currentUser.id
    }]);

    if (!error) {
        closeNewRoomModal();
        await loadRooms();
    }
}

// Enter billentyű a modal inputban
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('new-room-name').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') createRoom();
    });
});

// ════════════════════════════════════════
//  ÜZENETEK BETÖLTÉSE
// ════════════════════════════════════════
async function loadMessages() {
    if (!currentRoom) return;

    const { data: msgs } = await db.from('messages')
        .select('*')
        .eq('room_id', currentRoom.id)
        .order('created_at', { ascending: true });

    const box = document.getElementById('chat-messages');
    box.innerHTML = '';

    if (!msgs || msgs.length === 0) {
        box.innerHTML = `
            <div style="text-align:center;color:var(--text-muted);padding:40px;font-size:0.88rem;">
                Még nincs üzenet ebben a szobában. Légy az első! 👋
            </div>`;
        return;
    }

    msgs.forEach(m => renderMessage(m, box));
    box.scrollTop = box.scrollHeight;
}

function renderMessage(m, container) {
    const isMine = m.user_id === currentUser.id;
    const initial = (m.username || '?').charAt(0).toUpperCase();
    const time = new Date(m.created_at).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });

    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper';
    wrapper.dataset.id = m.id;

    let contentHtml = '';

    if (m.file_url) {
        const isImage = /\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(m.file_url);
        if (isImage) {
            contentHtml = `<img class="msg-image" src="${escapeHtml(m.file_url)}" alt="kép" onclick="openLightbox('${escapeHtml(m.file_url)}')">`;
        } else {
            const fileName = m.file_name || 'Fájl letöltése';
            contentHtml = `<a class="msg-file" href="${escapeHtml(m.file_url)}" target="_blank" download>📎 ${escapeHtml(fileName)}</a>`;
        }
        if (m.content) {
            contentHtml = `<div class="msg-content">${escapeHtml(m.content)}</div>` + contentHtml;
        }
    } else {
        contentHtml = `<div class="msg-content">${escapeHtml(m.content)}</div>`;
    }

    wrapper.innerHTML = `
        <div class="msg-avatar">${initial}</div>
        <div class="msg-body">
            <div class="msg-meta">
                <span class="msg-author">${escapeHtml(m.username || 'Névtelen')}</span>
                <span class="msg-time">${time}</span>
            </div>
            ${contentHtml}
        </div>
        ${isMine ? `<button class="msg-delete" onclick="deleteMsg(${m.id})">Törlés</button>` : ''}
    `;

    if (container) container.appendChild(wrapper);
}

// ════════════════════════════════════════
//  ÜZENET KÜLDÉS
// ════════════════════════════════════════
async function sendMessage() {
    if (!currentRoom) return;

    const input = document.getElementById('chat-input');
    const content = input.value.trim();

    if (!content && !pendingFile) return;

    let fileUrl = null;
    let fileName = null;

    // Fájl feltöltés
    if (pendingFile) {
        const result = await uploadFile(pendingFile);
        if (result) {
            fileUrl = result.url;
            fileName = result.name;
        }
        clearFile();
    }

    // Üzenet mentés
    await db.from('messages').insert([{
        room_id:  currentRoom.id,
        user_id:  currentUser.id,
        username: currentUser.username,
        content:  content,
        file_url: fileUrl,
        file_name: fileName
    }]);

    input.value = '';
    loadMessages();
}

// ════════════════════════════════════════
//  FÁJL / KÉP FELTÖLTÉS
// ════════════════════════════════════════
function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    pendingFile = file;

    document.getElementById('file-preview-name').innerText = file.name;
    document.getElementById('file-preview-bar').classList.remove('hidden');
}

function clearFile() {
    pendingFile = null;
    document.getElementById('file-preview-bar').classList.add('hidden');
    document.getElementById('file-input').value = '';
}

async function uploadFile(file) {
    const progress = document.getElementById('upload-progress');
    progress.classList.remove('hidden');

    try {
        const ext   = file.name.split('.').pop();
        const path  = `${currentUser.id}/${Date.now()}.${ext}`;

        const { data, error } = await db.storage
            .from('chat-files')
            .upload(path, file, { cacheControl: '3600', upsert: false });

        if (error) {
            console.error('Feltöltési hiba:', error);
            alert('Feltöltési hiba: ' + error.message);
            return null;
        }

        const { data: urlData } = db.storage.from('chat-files').getPublicUrl(path);
        return { url: urlData.publicUrl, name: file.name };

    } finally {
        progress.classList.add('hidden');
    }
}

// ════════════════════════════════════════
//  ÜZENET TÖRLÉS
// ════════════════════════════════════════
async function deleteMsg(id) {
    await db.from('messages').delete().eq('id', id);
    loadMessages();
}

// ════════════════════════════════════════
//  REALTIME FELIRATKOZÁS
// ════════════════════════════════════════
function subscribeMessages() {
    if (realtimeSub) db.removeChannel(realtimeSub);

    realtimeSub = db.channel('room-' + currentRoom.id)
        .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'messages',
            filter: `room_id=eq.${currentRoom.id}`
        }, () => loadMessages())
        .subscribe();
}

// ════════════════════════════════════════
//  LIGHTBOX
// ════════════════════════════════════════
function openLightbox(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
}

// ════════════════════════════════════════
//  KIJELENTKEZÉS
// ════════════════════════════════════════
async function signOut() {
    await db.auth.signOut();
    location.reload();
}

// ════════════════════════════════════════
//  ENTER KÜLDÉS
// ════════════════════════════════════════
document.getElementById('chat-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

// ════════════════════════════════════════
//  SEGÉDFÜGGVÉNY — XSS védelem
// ════════════════════════════════════════
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// ════════════════════════════════════════
//  INDÍTÁS
// ════════════════════════════════════════
initApp();
</script>
